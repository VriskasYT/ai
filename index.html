let keyboardLang = 'ru';
let keyboardShift = false;

function initCustomKeyboard() {
  const grid = document.getElementById('ai-kbd-grid');
  const suggestionsEl = document.getElementById('ai-kbd-suggestions');
  if (!grid || !suggestionsEl) return;
  renderCustomKeyboardKeys();
  suggestionsEl.innerHTML = [
    'Привет 😊', 'Нарисуй кота', 'Сделай музыку', 'Позови Gemini', 'Думай', 'Сделай видео'
  ].map(s => `<button class="ai-kbd-suggestion" onclick="insertSuggestion('${s.replace(/'/g, "\\'")}')">${escapeHtml(s)}</button>`).join('');
  if (customKeyboardEnabled && isMobileDevice()) enableCustomKeyboard();
}

function renderCustomKeyboardKeys() {
  const grid = document.getElementById('ai-kbd-grid');
  if (!grid) return;
  const rows = keyboardLang === 'ru'
    ? [
        ['й','ц','у','к','е','н','г','ш','щ','з'],
        ['ф','ы','в','а','п','р','о','л','д','ж'],
        ['я','ч','с','м','и','т','ь','б','ю']
      ]
    : [
        ['q','w','e','r','t','y','u','i','o','p'],
        ['a','s','d','f','g','h','j','k','l'],
        ['z','x','c','v','b','n','m']
      ];

  const applyCase = (ch) => keyboardShift ? ch.toUpperCase() : ch;
  const keyBtn = (label, cls = '', onClick = '', display = null) =>
    `<button class="ai-key ${cls}" ${onClick ? `onclick="${onClick}"` : `onclick="keyboardType('${label.replace(/'/g, "\\'")}')"`}>${escapeHtml(display || label)}</button>`;

  let html = '';
  rows[0].forEach(k => html += keyBtn(applyCase(k)));
  rows[1].forEach(k => html += keyBtn(applyCase(k)));
  html += keyBtn('⇧', 'wide', 'toggleKeyboardShift()', keyboardShift ? '⬆️' : '⇧');
  rows[2].forEach(k => html += keyBtn(applyCase(k)));
  html += keyBtn('⌫', 'wide', 'keyboardBackspace()');
  html += keyBtn(keyboardLang === 'ru' ? 'EN' : 'RU', 'wide', 'toggleKeyboardLang()');
  html += keyBtn(',', '', 'keyboardType(",")');
  html += keyBtn('пробел', 'xwide', 'keyboardType(" ")', 'пробел');
  html += keyBtn('.', '', 'keyboardType(".")');
  html += keyBtn('😊', '', 'keyboardType("😊")');
  html += keyBtn('↵', 'wide primary', 'keyboardSendOrNewline()', 'Отпр');
  grid.innerHTML = html;
}

function toggleKeyboardLang() {
  keyboardLang = keyboardLang === 'ru' ? 'en' : 'ru';
  renderCustomKeyboardKeys();
}

function toggleKeyboardShift() {
  keyboardShift = !keyboardShift;
  renderCustomKeyboardKeys();
}

function isMobileDevice() {
  return window.matchMedia('(max-width: 900px)').matches || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function getComposer() { return document.getElementById('msg-input'); }
function getComposerProxy() { return document.getElementById('msg-input-proxy'); }

function syncComposerFromProxy() {
  const input = getComposer();
  const proxy = getComposerProxy();
  if (!input || !proxy) return;
  input.value = proxy.value;
  autoResize(input);
  updateSendButton();
}

function syncProxyFromComposer() {
  const input = getComposer();
  const proxy = getComposerProxy();
  if (!input || !proxy) return;
  proxy.value = input.value;
}

function prepareProxyComposerState() {
  const input = getComposer();
  const proxy = getComposerProxy();
  if (!input || !proxy) return;
  input.setAttribute('readonly', 'readonly');
  input.setAttribute('inputmode', 'none');
  input.classList.add('kbd-proxy');
  proxy.value = input.value;
}

function restoreNativeComposerState() {
  const input = getComposer();
  const proxy = getComposerProxy();
  if (!input || !proxy) return;
  input.removeAttribute('readonly');
  input.removeAttribute('inputmode');
  input.classList.remove('kbd-proxy');
  input.value = proxy.value;
  autoResize(input);
}

function interceptComposerPointer(e) {
  if (!customKeyboardEnabled || !isMobileDevice()) return;
  e.preventDefault?.();
  e.stopPropagation?.();
  prepareProxyComposerState();
  showCustomKeyboard();
}

function handleComposerFocus(e) {
  if (!customKeyboardEnabled || !isMobileDevice()) return;
  e.preventDefault?.();
  e.stopPropagation?.();
  const input = getComposer();
  prepareProxyComposerState();
  input.blur();
  showCustomKeyboard();
}

function showCustomKeyboard() {
  const kbd = document.getElementById('ai-keyboard');
  const proxy = getComposerProxy();
  if (!kbd) return;
  kbd.classList.add('show');
  document.body.classList.add('ai-kbd-active');
  const helper = document.getElementById('ai-kbd-ai-input');
  if (helper) helper.blur();
  if (proxy && isMobileDevice()) {
    proxy.focus({ preventScroll: true });
    proxy.blur();
  }
}

function hideCustomKeyboard() {
  const kbd = document.getElementById('ai-keyboard');
  if (!kbd) return;
  kbd.classList.remove('show');
  document.body.classList.remove('ai-kbd-active');
}

function enableCustomKeyboard() {
  customKeyboardEnabled = true;
  localStorage.setItem('nexus_custom_keyboard', '1');
  const input = getComposer();
  if (isMobileDevice()) {
    prepareProxyComposerState();
    input.blur();
  }
  showCustomKeyboard();
}

function disableCustomKeyboard() {
  customKeyboardEnabled = false;
  localStorage.setItem('nexus_custom_keyboard', '0');
  restoreNativeComposerState();
  hideCustomKeyboard();
}

function keyboardType(text) {
  const proxy = getComposerProxy();
  const input = getComposer();
  const target = (customKeyboardEnabled && isMobileDevice()) ? proxy : input;
  const start = target.selectionStart ?? target.value.length;
  const end = target.selectionEnd ?? target.value.length;
  target.value = target.value.slice(0, start) + text + target.value.slice(end);
  const pos = start + text.length;
  try { target.setSelectionRange(pos, pos); } catch {}
  if (target === proxy) syncComposerFromProxy(); else syncProxyFromComposer();
  autoResize(input);
  updateSendButton();
}

function keyboardBackspace() {
  const proxy = getComposerProxy();
  const input = getComposer();
  const target = (customKeyboardEnabled && isMobileDevice()) ? proxy : input;
  const start = target.selectionStart ?? target.value.length;
  const end = target.selectionEnd ?? target.value.length;
  if (start !== end) {
    target.value = target.value.slice(0, start) + target.value.slice(end);
    try { target.setSelectionRange(start, start); } catch {}
  } else if (start > 0) {
    target.value = target.value.slice(0, start - 1) + target.value.slice(end);
    try { target.setSelectionRange(start - 1, start - 1); } catch {}
  }
  if (target === proxy) syncComposerFromProxy(); else syncProxyFromComposer();
  autoResize(input);
  updateSendButton();
}

function keyboardSendOrNewline() {
  if (document.getElementById('msg-input').value.trim() || attachments.length) handleSend();
  else keyboardType('\n');
}

function insertSuggestion(text) {
  keyboardType((document.getElementById('msg-input').value ? ' ' : '') + text);
}

async function aiKeyboardAssist() {
  const helper = document.getElementById('ai-kbd-ai-input');
  const prompt = helper.value.trim();
  if (!prompt) return;
  helper.value = '';
  try {
    const resp = await fetch(`${API_BASE}/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
      body: JSON.stringify({
        model: 'openai-fast',
        messages: [
          { role: 'system', content: 'Ты встроен в кастомную клавиатуру. Коротко помоги набрать фразу пользователя. Верни только готовый текст без пояснений, 1 короткая реплика.' },
          { role: 'user', content: prompt }
        ],
        temperature: 0.7
      })
    });
    const data = await resp.json();
    const text = data.choices?.[0]?.message?.content?.trim();
    if (text) insertSuggestion(text);
  } catch(e) {
    insertSuggestion('Помоги, пожалуйста 😊');
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  const modal = document.getElementById('modal-content');
  modal.classList.remove('modal-wide');
}

// Topbar scroll effect
document.getElementById('chat-area').addEventListener('scroll', function() {
  document.getElementById('topbar').classList.toggle('scrolled', this.scrollTop > 10);
});

// Close menus on outside click
document.addEventListener('click', (e) => {
  const menu = document.getElementById('attach-menu');
  if (menu.classList.contains('show') && !e.target.closest('.attach-menu') && !e.target.closest('[onclick="toggleAttachMenu()"]')) {
    menu.classList.remove('show');
  }
});

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// Keep layout stable on mobile keyboard appearance
function syncMobileViewport() {
  const vv = window.visualViewport;
  const app = document.querySelector('.app');
  const chatArea = document.getElementById('chat-area');
  if (!app || !chatArea) return;
  const h = vv ? vv.height : window.innerHeight;
  app.style.height = h + 'px';
  document.body.style.height = h + 'px';
  if (customKeyboardEnabled && isMobileDevice()) {
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  }
}

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', syncMobileViewport);
  window.visualViewport.addEventListener('scroll', syncMobileViewport);
}
window.addEventListener('resize', syncMobileViewport);
window.addEventListener('orientationchange', () => setTimeout(syncMobileViewport, 80));
document.addEventListener('focusin', () => {
  if (customKeyboardEnabled && isMobileDevice()) {
    setTimeout(syncMobileViewport, 30);
  }
});

// Expose module functions for inline handlers
const __inlineHandlers = {
  toggleSidebar: typeof toggleSidebar !== 'undefined' ? toggleSidebar : undefined,
  createNewChat: typeof createNewChat !== 'undefined' ? createNewChat : undefined,
  switchChat: typeof switchChat !== 'undefined' ? switchChat : undefined,
  deleteChat: typeof deleteChat !== 'undefined' ? deleteChat : undefined,
  openCloudAuthModal: typeof openCloudAuthModal !== 'undefined' ? openCloudAuthModal : undefined,
  submitCloudAuth: typeof submitCloudAuth !== 'undefined' ? submitCloudAuth : undefined,
  logoutCloud: typeof logoutCloud !== 'undefined' ? logoutCloud : undefined,
  openModelPicker: typeof openModelPicker !== 'undefined' ? openModelPicker : undefined,
  setTextModel: typeof setTextModel !== 'undefined' ? setTextModel : undefined,
  setImageModel: typeof setImageModel !== 'undefined' ? setImageModel : undefined,
  setVideoModel: typeof setVideoModel !== 'undefined' ? setVideoModel : undefined,
  setMusicModel: typeof setMusicModel !== 'undefined' ? setMusicModel : undefined,
  toggleAttachMenu: typeof toggleAttachMenu !== 'undefined' ? toggleAttachMenu : undefined,
  attachFile: typeof attachFile !== 'undefined' ? attachFile : undefined,
  handleFileSelect: typeof handleFileSelect !== 'undefined' ? handleFileSelect : undefined,
  removeAttachment: typeof removeAttachment !== 'undefined' ? removeAttachment : undefined,
  handleInputKey: typeof handleInputKey !== 'undefined' ? handleInputKey : undefined,
  autoResize: typeof autoResize !== 'undefined' ? autoResize : undefined,
  handleSend: typeof handleSend !== 'undefined' ? handleSend : undefined,
  viewImage: typeof viewImage !== 'undefined' ? viewImage : undefined,
  closeModal: typeof closeModal !== 'undefined' ? closeModal : undefined,
  useSuggestion: typeof useSuggestion !== 'undefined' ? useSuggestion : undefined,
  openCodeArtifact: typeof openCodeArtifact !== 'undefined' ? openCodeArtifact : undefined,
  copyArtifactCode: typeof copyArtifactCode !== 'undefined' ? copyArtifactCode : undefined,
  copyCode: typeof copyCode !== 'undefined' ? copyCode : undefined,
  submitInlineInput: typeof submitInlineInput !== 'undefined' ? submitInlineInput : undefined,
  hideCustomKeyboard: typeof hideCustomKeyboard !== 'undefined' ? hideCustomKeyboard : undefined,
  aiKeyboardAssist: typeof aiKeyboardAssist !== 'undefined' ? aiKeyboardAssist : undefined,
  insertSuggestion: typeof insertSuggestion !== 'undefined' ? insertSuggestion : undefined,
  keyboardType: typeof keyboardType !== 'undefined' ? keyboardType : undefined,
  keyboardBackspace: typeof keyboardBackspace !== 'undefined' ? keyboardBackspace : undefined,
  keyboardSendOrNewline: typeof keyboardSendOrNewline !== 'undefined' ? keyboardSendOrNewline : undefined,
  toggleKeyboardLang: typeof toggleKeyboardLang !== 'undefined' ? toggleKeyboardLang : undefined,
  toggleKeyboardShift: typeof toggleKeyboardShift !== 'undefined' ? toggleKeyboardShift : undefined,
  openChessModal: typeof openChessModal !== 'undefined' ? openChessModal : undefined,
  inviteFriend: typeof inviteFriend !== 'undefined' ? inviteFriend : undefined,
  renderChat: typeof renderChat !== 'undefined' ? renderChat : undefined,
  showWelcome: typeof showWelcome !== 'undefined' ? showWelcome : undefined,
  handleGeneratedImageLoad: typeof handleGeneratedImageLoad !== 'undefined' ? handleGeneratedImageLoad : undefined,
  handleGeneratedImageError: typeof handleGeneratedImageError !== 'undefined' ? handleGeneratedImageError : undefined,
  handleGeneratedVideoLoad: typeof handleGeneratedVideoLoad !== 'undefined' ? handleGeneratedVideoLoad : undefined,
  handleGeneratedVideoError: typeof handleGeneratedVideoError !== 'undefined' ? handleGeneratedVideoError : undefined,
  handleGeneratedAudioLoad: typeof handleGeneratedAudioLoad !== 'undefined' ? handleGeneratedAudioLoad : undefined,
  handleGeneratedAudioError: typeof handleGeneratedAudioError !== 'undefined' ? handleGeneratedAudioError : undefined
};
for (const [name, fn] of Object.entries(__inlineHandlers)) {
  if (typeof fn === 'function') window[name] = fn;
}

// Init
init();
initCloudAuthWatcher();
syncMobileViewport();
window.VrisAi = { version: 'vrisai-hotfix-inline-handlers-1' };
window.NexusAI = window.VrisAi;
</script>
